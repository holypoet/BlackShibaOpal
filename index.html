<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080d;--bg2:#0e0d15;--bg3:#13121c;
  --border:#1e1c2a;--text:#e0dbd0;--muted:#6a6470;
  --accent:#9b85d8;--accent2:#5ecbd8;
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
.logo-text{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;line-height:1.3}
.logo-text span{color:var(--text);display:block;font-size:13px;letter-spacing:1px}
.lang-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;border-radius:3px;transition:all .2s;letter-spacing:1px}
.lang-btn:hover{color:var(--text);border-color:#5a5078}
nav{display:flex;gap:1.5rem;align-items:center}
nav a{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;transition:color .2s}
nav a:hover{color:var(--text)}

.hero{text-align:center;padding:4rem 1.5rem 3rem;border-bottom:1px solid var(--border)}
.hero-eyebrow{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:1.25rem}
.hero-title{font-size:clamp(2.2rem,6vw,4rem);font-weight:300;line-height:1.1;margin-bottom:1rem;color:#f0ebe0}
.opal-text{display:inline-block;background:linear-gradient(120deg,#b8a9e8,#7ec8d4,#a8d8a8,#d4b8e8,#8ec8e8,#b8a9e8);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:opalShift 6s ease infinite}
@keyframes opalShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hero-sub{font-size:13px;letter-spacing:2px;color:var(--muted)}

.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:1.5rem 1rem;border-bottom:1px solid var(--border)}
.search-bar{padding:.6rem 1rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.search-bar input{width:100%;max-width:480px;display:block;margin:0 auto;padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:#5a5078}
.search-bar input::placeholder{color:var(--muted)}
.filter-btn{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:#5a5078;color:var(--accent);background:#13101e}

.tag-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.tag-btn{font-size:10px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;border-radius:12px}
.tag-btn:hover{color:var(--text);border-color:#4a4a5a}
.tag-btn.active{border-color:var(--accent2);color:var(--accent2);background:#0e1e2a}

.sort-select{font-size:10px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:12px;font-family:inherit;cursor:pointer}
.sort-select:focus{outline:none;border-color:#5a5078}

.grid-wrap{padding:2rem 1.5rem;max-width:900px;margin:0 auto}
.grid-title{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;text-align:center}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:var(--border)}
.card{background:var(--bg2);cursor:pointer;transition:background .25s;position:relative;overflow:hidden}
.card:hover{background:var(--bg3)}
.card-img{width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;border-bottom:1px solid var(--border);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;image-rendering:auto}
.card-img .placeholder{font-size:2.5rem;z-index:1}
.card-body{padding:.75rem}
.card-category{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.card-name{font-size:13px;color:#d4cfc4;margin-bottom:5px;font-weight:400;line-height:1.3}
.card-price{font-size:12px;color:var(--accent)}
.card-status{position:absolute;top:6px;right:6px;font-size:9px;letter-spacing:1px;padding:2px 7px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.card-status.sold{color:#d85a30;border-color:#3a2018}
.card-status.reserved{color:#e0c050;border-color:#4a4010}
.card-status.hot{color:#9b85d8;border-color:#3a2848}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);max-width:680px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;z-index:10}

/* DETAIL TABS */
.detail-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.detail-tab{flex:1;padding:.6rem;font-size:11px;letter-spacing:1px;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:inherit;transition:all .2s;border-bottom:2px solid transparent}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-panel{display:none}.detail-panel.active{display:block}

/* ең–зүҮијӘж’ӯ */
.img-slider{width:100%;background:#050508;border-top:1px solid var(--border);position:relative;overflow:hidden;touch-action:pan-y}
.img-slider-track{display:flex;transition:transform .35s ease;width:100%;touch-action:pan-y}
.img-slide{flex:0 0 100%;width:100%;max-width:100%;height:50vw;max-height:420px;min-height:260px;display:flex;align-items:center;justify-content:center;box-sizing:border-box;touch-action:pan-y}
.img-slide img{width:100%;height:100%;object-fit:contain;padding:1rem;box-sizing:border-box;pointer-events:none}
.img-slide.video-slide{background:#000;padding:0}
.img-slide.video-slide iframe{width:100%;height:100%;border:none}
.slide-label{position:absolute;top:8px;left:8px;font-size:10px;letter-spacing:1px;padding:2px 8px;background:rgba(0,0,0,.6);color:#fff;border-radius:2px}
.img-slide .ph{font-size:5rem}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:none;color:#fff;font-size:18px;width:36px;height:36px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s}
.slider-btn:hover{background:rgba(0,0,0,.8)}
.slider-btn.prev{left:8px}
.slider-btn.next{right:8px}
.slider-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.slider-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:background .2s}
.slider-dot.active{background:rgba(255,255,255,.9)}

.modal-body{padding:1.5rem}
.modal-category{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.modal-name{font-size:22px;font-weight:300;margin-bottom:.5rem;color:#f0ebe0}
.modal-price{font-size:18px;color:var(--accent);margin-bottom:1.25rem}

/* иҰҸж јиЎЁ CSS */
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:0;border:1px solid var(--border)}
.spec-item{display:flex;flex-direction:column;gap:4px;padding:.75rem 1rem;background:var(--bg2)}
.spec-item.full{grid-column:1/-1}

.modal-desc{font-size:14px;color:#8a8278;line-height:1.8;margin-bottom:1.25rem}

  display:block;text-align:center;padding:12px;border:1px solid #5a5078;
  color:var(--accent);font-size:12px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;background:transparent;font-family:inherit;width:100%;transition:background .2s;margin-bottom:8px;
}
.modal-cta:hover{background:#1e1a2e}
.modal-cta.sold-out{border-color:var(--border);color:var(--muted);cursor:default}

  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:11px;background:#06C755;color:#fff;
  border:none;font-size:13px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;transition:background .2s;margin-top:8px;border-radius:3px;
}
.line-btn:hover{background:#05b34d}
.line-add-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:11px;background:transparent;color:#06C755;
  border:1px solid #06C755;font-size:13px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;transition:all .2s;margin-top:6px;border-radius:3px;
}
.line-add-btn:hover{background:#06C755;color:#fff}
.line-btn svg{width:18px;height:18px;fill:#fff;flex-shrink:0}
.share-row{display:flex;gap:8px;margin-top:8px}
.share-btn{
  flex:1;padding:8px;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:11px;letter-spacing:1px;cursor:pointer;
  font-family:inherit;transition:all .2s;border-radius:3px;
}
.share-btn:hover{color:var(--text);border-color:#5a5078;background:var(--bg3)}

/* VIDEO */
.video-section{margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.video-section-title{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:.75rem}
.video-embed{width:100%;aspect-ratio:16/9;border:1px solid var(--border);background:#000;margin-bottom:.75rem;border-radius:4px;overflow:hidden}
.video-embed iframe{width:100%;height:100%;border:none}

/* ORDER FORM */
.order-form{margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;display:none}
.order-form.show{display:block}
.order-form h3{font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;font-weight:400}
.form-group{margin-bottom:.875rem}
.form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.form-group input,.form-group textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;font-size:14px;border-radius:3px;font-family:inherit;transition:border .2s;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#5a5078}
.form-group textarea{min-height:60px;resize:vertical;line-height:1.6}
.submit-btn{
  width:100%;padding:12px;background:#3d2d6e;color:#c4b0f0;border:1px solid #5a4090;
  font-size:13px;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:background .2s;border-radius:3px;
}
.submit-btn:hover{background:#4d3d8e}
.submit-btn:disabled{opacity:.5;cursor:default}
.order-success{text-align:center;padding:1.5rem;display:none}
.order-success.show{display:block}
.order-success-icon{font-size:2.5rem;margin-bottom:.75rem}
.order-success p{font-size:14px;color:#8a8278;line-height:1.7}

/* PAYMENT INFO */
.payment-info{background:var(--bg3);border:1px solid var(--border);padding:1rem;margin-top:1rem;border-radius:3px;font-size:13px;color:var(--muted);line-height:1.8}
.payment-info strong{color:var(--text);display:block;margin-bottom:.5rem;font-size:12px;letter-spacing:1px}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem;display:block}
.empty p{font-size:14px;line-height:1.8}

footer{border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:11px;color:var(--muted);letter-spacing:1px}
footer a{color:var(--muted);transition:color .2s}
footer a:hover{color:var(--text)}

@media(max-width:600px){
  header{padding:1rem}
  nav .hide-mobile{display:none}
  .hero{padding:3rem 1rem 2rem}
  .modal{max-height:100vh;height:100%;border:none}
  .modal-overlay{padding:0}
  .img-slide{height:60vw;max-height:60vh}
  .slider-btn{width:40px;height:40px;font-size:20px}
  .slider-btn.prev{left:6px}
  .slider-btn.next{right:6px}
}
</style>

function t(key,vars){
  let s=i18n[currentLang]?.[key]||i18n.zh[key]||key;
  if(vars)Object.keys(vars).forEach(k=>{s=s.replace('{'+k+'}',vars[k]);});
  return s;
}

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(el.tagName==='OPTION')el.textContent=t(key);
    else el.textContent=t(key);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{
    el.innerHTML=t(el.getAttribute('data-i18n-html'));
  });
}

        p.size, p.weight, p.gaa_source,
        tagsStr
      ].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(currentSearch);
    });
  }

  // жҺ’еәҸ
  const sort=document.getElementById('sortSelect')?.value||'newest';
  if(sort==='price-low') list.sort((a,b)=>(a.price||0)-(b.price||0));
  else if(sort==='price-high') list.sort((a,b)=>(b.price||0)-(a.price||0));
  else{
    // зҶұй–Җе„Әе…ҲпјҢеҶҚжҢүжҷӮй–“
    list.sort((a,b)=>{
      if(a.status==='зҶұй–Җ'&&b.status!=='зҶұй–Җ') return -1;
      if(b.status==='зҶұй–Җ'&&a.status!=='зҶұй–Җ') return 1;
      return 0;
    });
  }

  // е·Іе”®еҮә/е·Ій җе®ҡж°ёйҒ зҪ®еә•пјҲиҰҶи“ӢеңЁжүҖжңүжҺ’еәҸд№ӢеҫҢпјү
  const SOLD_STATUS=['е·Іе”®еҮә','е·Ій җе®ҡ'];
  list.sort((a,b)=>{
    const aSold=SOLD_STATUS.includes(a.status)?1:0;
    const bSold=SOLD_STATUS.includes(b.status)?1:0;
    return aSold-bSold;
  });
  
  cachedProducts = list; 
  
  const grid=document.getElementById('productGrid');
  const title=document.getElementById('gridTitle');
  const empty=document.getElementById('emptyMsg');
  title.textContent=t('product_count',{n:list.length});
  if(list.length===0){
    grid.innerHTML='';
    empty.innerHTML=`<div class="empty"><span class="empty-icon">рҹ’Һ</span><p>${t('no_product')}</p></div>`;
    return;
  }
  empty.innerHTML='';
  grid.innerHTML=list.map((p,i)=>{
    const imgHtml=p.image
      ?`<img src="${p.image}" alt="${seoAlt(p)}" loading="lazy"><span class="placeholder" style="display:none">${EMOJI[p.category]||'рҹ’Һ'}</span>`
      :`<span class="placeholder">${EMOJI[p.category]||'рҹ’Һ'}</span>`;
    const statusHtml=p.status==='е·Іе”®еҮә'?`<span class="card-status sold">${t('status_sold')}</span>`:p.status==='е·Ій җе®ҡ'?`<span class="card-status reserved">${t('status_reserved')}</span>`:p.status==='зҶұй–Җ'?`<span class="card-status hot">${t('status_hot')}</span>`:'';
    return `
      <div class="card" onclick="openModal(${i})">
        <div class="card-img">${imgHtml}${statusHtml}</div>
        <div class="card-body">
          <div class="card-category">${p.category||''}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price">NT$ ${Number(p.price).toLocaleString()}</div>
        </div>
      </div>`;
  }).join('');
}

function openModal(idx){
  const p=cachedProducts[idx];

  const isSold=p.status==='е·Іе”®еҮә'||p.status==='е·Ій җе®ҡ';

  const imgs=Array.isArray(p.images)&&p.images.length?p.images:(p.image?[{src:p.image}]:[]);

  // еҗҲдҪөең–зүҮе’ҢеҪұзүҮжҲҗдёҖеҖӢијӘж’ӯ

    ...imgs.map(img=>({type:'image',src:img.src||img})),
    ...vids.map(v=>({type:'video',url:v.url||v}))

  const totalSlides=allSlides.length;
  const slidesHtml=allSlides.map((s,i)=>{
    if(s.type==='image'){
      return `<div class="img-slide"><img src="${s.src}" alt="${seoAlt(p)}" loading="lazy" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span class=\\'ph\\'>${EMOJI[p.category]||'рҹ’Һ'}</span>')"></div>`;
    } else {
      // и§ЈжһҗеҪұзүҮ embed URL
      let embedUrl=s.url;
      const ytm=s.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)?([\w-]{11})$/);
      if(s.url.includes('youtube.com')||s.url.includes('youtu.be')){
        const vid=s.url.match(/(?:v=|youtu\.be\/|embed\/)([\w-]+)/);
        if(vid)embedUrl='https://www.youtube.com/embed/'+vid[1]+'?rel=0';
      } else if(s.url.includes('drive.google.com')){
        const did=s.url.match(/\/d\/([\w-]+)/);
        if(did)embedUrl='https://drive.google.com/file/d/'+did[1]+'/preview';
      }
      return `<div class="img-slide video-slide"><span class="slide-label">в–¶ еҪұзүҮ</span><iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe></div>`;
    }
  }).join('');
  const dotsHtml=allSlides.map((_,i)=>`<div class="slider-dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('');
  const sliderHtml=totalSlides>0?`
    <div class="img-slider" id="imgSlider">

      </div>

  // Tab 1: еҹәжң¬иіҮиЁҠ
  const si=(label,value,full=false)=>value?`<div class="spec-item${full?' full':''}"><span class="spec-label">${label}</span><span class="spec-value">${value}</span></div>`:'';
  const originStr=[p.country,p.origin,p.claim].filter(Boolean).join(' В· ');
  const tab1=`<div class="spec-grid">
    ${si(t('spec_origin'),originStr,true)}
    ${si(t('spec_weight'),p.weight)}
    ${si(t('spec_size'),p.size)}

  </div>`;

  // Tab 2: GAA жҸҸиҝ°
  const varietyStr=[p.variety,p.natural_subtype||p.composite_type||p.synthetic_info||p.imitation_info].filter(Boolean).join(' В· ');
  const treatmentStr=[p.treatment,p.treatment_detail].filter(Boolean).join(' В· ');
  const tab2=`<div class="spec-grid">

  // еҪұзүҮе·Іж•ҙеҗҲеҲ°ијӘж’ӯпјҢtab3 дёҚеҶҚйЎҜзӨә

        <button class="detail-tab" onclick="switchTab(2,this)">${t('tab_desc')}</button>

    </div>
    ${sliderHtml}
    <div class="modal-body">
      ${isSold
        ?`<button class="modal-cta sold-out" disabled style="margin-top:1rem">${p.status==='е·Ій җе®ҡ'?t('btn_reserved'):t('btn_sold')}</button>`

            ${t("line_chat")}
          </button>
          <button class="line-add-btn" onclick="addLineFriend()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="#06C755"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
            ${t("line_add")}
          </button>
          <div class="share-row">
            <button class="share-btn" onclick="shareToLine('${p.name.replace(/'/g,"\'")}',document.getElementById('modalContent').dataset.idx||0)">${t("share_line")}</button>
            <button class="share-btn" onclick="shareProduct('${p.name.replace(/'/g,"\'")}',${document.getElementById('modalContent').dataset.idx||0})">${t("share_copy")}</button>
          </div>
        </div>`
      }
      <div class="order-form" id="orderForm">
        <h3>еЎ«еҜ«иЁӮиіјиіҮж–ҷ</h3>
        <div class="form-group">
          <label>${t('label_name')}</label>
          <input type="text" id="o-name" placeholder="${t('ph_name')}">
        </div>
        <div class="form-group">
          <label>${t('label_contact')}</label>
          <input type="text" id="o-contact" placeholder="${t('ph_contact')}">
        </div>
        <div class="form-group">
          <label>${t('label_email')}</label>
          <input type="email" id="o-email" placeholder="${t('ph_email')}">
        </div>
        <div class="form-group">
          <label>${t('label_address')}</label>
          <input type="text" id="o-address" placeholder="${t('ph_address')}">

  sliderIdx=0;

function toggleOrderForm(){
  const form=document.getElementById('orderForm');
  form.classList.toggle('show');
  if(form.classList.contains('show')) document.getElementById('o-name')?.focus();
}

async function submitOrder(){
  const name=document.getElementById('o-name').value.trim();
  const contact=document.getElementById('o-contact').value.trim();
  const email=document.getElementById('o-email').value.trim();
  if(!name||!contact||!email){ alert('и«ӢеЎ«еҜ«е§“еҗҚгҖҒиҒҜзөЎж–№ејҸе’Ң Email'); return; }

  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='йҖҒеҮәдёӯ...';

  const p=currentProduct;
  const order={
    product_id: p.id,
    product_name: p.name,
    price: p.price,
    buyer_name: name,
    contact: contact,
    email: email,
    address: document.getElementById('o-address').value.trim(),
    note: document.getElementById('o-note').value.trim(),
    status: 'ж–°иЁӮе–®'
  };

  try{
    await createOrder(order);
    await decreaseStock(p.id);

    if(FORMSPREE_ID && FORMSPREE_ID !== 'YOUR_FORMSPREE_ID'){
      await fetch(`https://formspree.io/f/${FORMSPREE_ID}`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          _subject: `гҖҗй»‘жҹҙзҸ еҜ¶гҖ‘ж–°иЁӮе–® - ${p.name}`,
          е•Ҷе“Ғ: `${p.name} (NT$${Number(p.price).toLocaleString()})`,
          иІ·е®¶е§“еҗҚ: name,
          иҒҜзөЎж–№ејҸ: contact,
          Email: email,
          ж”¶д»¶ең°еқҖ: order.address||'пјҲжңӘеЎ«пјү',
          еӮҷиЁ»: order.note||'пјҲз„Ўпјү',
          дёӢе–®жҷӮй–“: new Date().toLocaleString('zh-TW')
        })
      }).catch(()=>{});
    }
    document.getElementById('submitBtn').style.display='none';
    document.getElementById('orderSuccess').classList.add('show');
    render();
  } catch(e){
    btn.disabled=false;btn.textContent='зўәиӘҚйҖҒеҮәиЁӮе–®';
    alert('йҖҒеҮәеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ');
  }
}

function switchTab(idx, btn){
  document.querySelectorAll('.detail-tab').forEach((b,i)=>{
    b.classList.toggle('active',i===idx);
    document.getElementById('dtab'+i)?.classList.toggle('active',i===idx);
  });
}
let sliderIdx=0;
function updateSlidePosition(animate=true){
  const track=document.getElementById('sliderTrack');
  const dots=document.querySelectorAll('.slider-dot');
  if(!track)return;
  track.style.transition=animate?'transform .35s ease':'none';
  track.style.transform=`translateX(-${sliderIdx*100}%)`;
  dots.forEach((d,i)=>d.classList.toggle('active',i===sliderIdx));
}
function slideImg(dir){
  const track=document.getElementById('sliderTrack');
  if(!track)return;
  const total=track.children.length;
  sliderIdx=Math.max(0,Math.min(total-1,sliderIdx+dir));
  updateSlidePosition();
}
function goSlide(i){
  sliderIdx=i;
  updateSlidePosition();
}

let touchStartX=0,touchDeltaX=0,isDragging=false;
function initSliderTouch(){
  const track=document.getElementById('sliderTrack');
  if(!track)return;
  track.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchDeltaX=0;
    isDragging=true;
    track.classList.add('dragging');
  },{passive:true});
  track.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    touchDeltaX=e.touches[0].clientX-touchStartX;
    const basePercent=-sliderIdx*100;
    const dragPercent=(touchDeltaX/track.offsetWidth)*100;
    track.style.transform=`translateX(${basePercent+dragPercent}%)`;
  },{passive:true});
  track.addEventListener('touchend',()=>{
    if(!isDragging)return;
    isDragging=false;
    track.classList.remove('dragging');
    const threshold=track.offsetWidth*0.15;
    if(touchDeltaX<-threshold) slideImg(1);
    else if(touchDeltaX>threshold) slideImg(-1);
    else updateSlidePosition();
  });
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal')){
    document.getElementById('modal').classList.remove('show');
    currentProduct=null;
  }
}

document.addEventListener('DOMContentLoaded', async ()=>{
  // URL еҸғж•ёпјҡ?p=idx зӣҙжҺҘй–Ӣе•Ҷе“Ғ
  const urlParams=new URLSearchParams(location.search);
  const pIdx=urlParams.get('p');
  if(pIdx!==null){
    await render();
    const idx=parseInt(pIdx);
    if(!isNaN(idx)&&cachedProducts[idx])openModal(idx);
    return;
  }
  const lb=document.getElementById('langBtn');
  if(lb)lb.textContent=currentLang==='zh'?'EN':'дёӯ';
  applyLang();
  render();
});
