<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑柴珠寶 BLACKSHIBAOPAL Jewelry｜天然蛋白石專門店</title>
<meta name="description" content="台灣天然蛋白石專門店。澳洲直採蛋白石原礦、裸石、半成品、成品珠寶。每顆獨一無二，變彩火光保證天然。">
<meta property="og:title" content="黑柴珠寶 BLACKSHIBAOPAL Jewelry｜天然蛋白石">
<meta property="og:description" content="澳洲直採天然蛋白石，原礦、裸石、成品珠寶，台灣專門店。">
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"JewelryStore",
  "name":"黑柴珠寶 BLACKSHIBAOPAL Jewelry",
  "description":"台灣天然蛋白石專門店，提供澳洲直採蛋白石原礦、裸石、半成品與成品珠寶。",
  "url":"https://holypoet.github.io/blackshibaopal",
  "sameAs":["https://www.instagram.com/blackshibaopal"],
  "currenciesAccepted":"TWD",
  "paymentAccepted":"銀行匯款, LINE Pay",
  "keywords":"蛋白石,opal,天然蛋白石,澳洲蛋白石,裸石,原礦,珠寶,台灣"
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080d;--bg2:#0e0d15;--bg3:#13121c;
  --border:#1e1c2a;--text:#e0dbd0;--muted:#6a6470;
  --accent:#9b85d8;--accent2:#5ecbd8;
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.logo span{color:var(--text)}
nav{display:flex;gap:1.5rem;align-items:center}
nav a{font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;transition:color .2s}
nav a:hover{color:var(--text)}
.cart-btn{
  font-size:12px;letter-spacing:1px;padding:6px 14px;
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  background:transparent;font-family:inherit;transition:all .2s;position:relative;
}
.cart-btn:hover{color:var(--text);border-color:#5a5078}
.cart-count{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#1a1030;
  font-size:10px;width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-weight:bold;
}
.cart-count.show{display:flex}

.hero{text-align:center;padding:4rem 1.5rem 3rem;border-bottom:1px solid var(--border)}
.hero-eyebrow{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:1.25rem}
.hero-title{font-size:clamp(2.2rem,6vw,4rem);font-weight:300;line-height:1.1;margin-bottom:1rem;color:#f0ebe0}
.opal-text{display:inline-block;background:linear-gradient(120deg,#b8a9e8,#7ec8d4,#a8d8a8,#d4b8e8,#8ec8e8,#b8a9e8);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:opalShift 6s ease infinite}
@keyframes opalShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hero-sub{font-size:13px;letter-spacing:2px;color:var(--muted)}

.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:1.5rem 1rem;border-bottom:1px solid var(--border)}
.filter-btn{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:#5a5078;color:var(--accent);background:#13101e}

.grid-wrap{padding:2rem 1.5rem;max-width:900px;margin:0 auto}
.grid-title{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;text-align:center}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--border)}
.card{background:var(--bg2);cursor:pointer;transition:background .25s;position:relative;overflow:hidden}
.card:hover{background:var(--bg3)}
.card-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3rem;border-bottom:1px solid var(--border);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-img .placeholder{font-size:3rem;z-index:1}
.card-body{padding:1rem}
.card-category{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:15px;color:#d4cfc4;margin-bottom:6px;font-weight:400;line-height:1.3}
.card-price{font-size:13px;color:var(--accent)}
.card-status{position:absolute;top:8px;right:8px;font-size:10px;letter-spacing:1px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.card-status.sold{color:#d85a30;border-color:#3a2018}
.card-status.hot{color:#9b85d8;border-color:#3a2848}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;z-index:1}
.modal-img{width:100%;aspect-ratio:4/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:5rem;border-bottom:1px solid var(--border);overflow:hidden}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:1.5rem}
.modal-category{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.modal-name{font-size:22px;font-weight:300;margin-bottom:.5rem;color:#f0ebe0}
.modal-price{font-size:18px;color:var(--accent);margin-bottom:1rem}
.modal-desc{font-size:14px;color:#8a8278;line-height:1.8;margin-bottom:1.25rem}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.modal-tag{font-size:10px;padding:3px 10px;border:1px solid var(--border);color:var(--muted);letter-spacing:1px}
.modal-cta{
  display:block;text-align:center;padding:12px;border:1px solid #5a5078;
  color:var(--accent);font-size:12px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;background:transparent;font-family:inherit;width:100%;transition:background .2s;margin-bottom:8px;
}
.modal-cta:hover{background:#1e1a2e}
.modal-cta.sold-out{border-color:var(--border);color:var(--muted);cursor:default}
.modal-cta.sold-out:hover{background:transparent}

/* ORDER FORM */
.order-form{margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;display:none}
.order-form.show{display:block}
.order-form h3{font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;font-weight:400}
.form-group{margin-bottom:.875rem}
.form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.form-group input,.form-group textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;font-size:14px;border-radius:3px;font-family:inherit;transition:border .2s;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#5a5078}
.form-group textarea{min-height:60px;resize:vertical;line-height:1.6}
.submit-btn{
  width:100%;padding:12px;background:#3d2d6e;color:#c4b0f0;border:1px solid #5a4090;
  font-size:13px;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:background .2s;border-radius:3px;
}
.submit-btn:hover{background:#4d3d8e}
.submit-btn:disabled{opacity:.5;cursor:default}
.order-success{text-align:center;padding:1.5rem;display:none}
.order-success.show{display:block}
.order-success-icon{font-size:2.5rem;margin-bottom:.75rem}
.order-success p{font-size:14px;color:#8a8278;line-height:1.7}

/* PAYMENT INFO */
.payment-info{background:var(--bg3);border:1px solid var(--border);padding:1rem;margin-top:1rem;border-radius:3px;font-size:13px;color:var(--muted);line-height:1.8}
.payment-info strong{color:var(--text);display:block;margin-bottom:.5rem;font-size:12px;letter-spacing:1px}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem;display:block}
.empty p{font-size:14px;line-height:1.8}

footer{border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:11px;color:var(--muted);letter-spacing:1px}
footer a{color:var(--muted);transition:color .2s}
footer a:hover{color:var(--text)}

@media(max-width:600px){header{padding:1rem}nav .hide-mobile{display:none}.hero{padding:3rem 1rem 2rem}}
</style>
</head>
<body>

<header>
  <div class="logo"><span>黑柴珠寶</span> · BLACKSHIBAOPAL Jewelry</div>
  <nav>
    <a href="#" class="hide-mobile">商品</a>
    <a href="https://instagram.com/blackshibaopal" target="_blank" class="hide-mobile">Instagram</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow">台灣 · 天然蛋白石專門店</div>
  <h1 class="hero-title">每顆<span class="opal-text">蛋白石</span><br>都是獨一無二的宇宙</h1>
  <p class="hero-sub">澳洲直採 · 原礦 · 裸石 · 成品</p>
</section>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">全部商品</button>
  <button class="filter-btn" onclick="setFilter('原礦',this)">原礦</button>
  <button class="filter-btn" onclick="setFilter('裸石',this)">裸石</button>
  <button class="filter-btn" onclick="setFilter('半成品',this)">半成品</button>
  <button class="filter-btn" onclick="setFilter('成品',this)">成品</button>
</div>

<div class="grid-wrap">
  <div class="grid-title" id="gridTitle">載入商品中...</div>
  <div class="product-grid" id="productGrid"></div>
  <div id="emptyMsg"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer>
  <p>黑柴珠寶 BLACKSHIBAOPAL Jewelry &nbsp;·&nbsp;
    <a href="https://instagram.com/blackshibaopal" target="_blank">@blackshibaopal</a>
    &nbsp;·&nbsp; 天然蛋白石 · 澳洲直採
  </p>
</footer>

<script>
const FORMSPREE_ID = 'YOUR_FORMSPREE_ID'; // 設定後替換這裡
const NOTIFY_EMAIL = 'blackshibawolf@gmail.com';
const EMOJI = {'原礦':'🪨','裸石':'💎','半成品':'🔧','成品':'✨'};
let currentFilter = 'all';
let currentProduct = null;
let cachedProducts = []; // 供彈出視窗使用

// Supabase 設定 
const SB_URL = 'https://obujbaevimyquefwgnxm.supabase.co';
const SB_KEY = 'sb_publishable_jdHW-a9YVioP2VQh4Besuw_Z8J95PWi';
const sbHeaders = {
  'apikey': SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// 從 Supabase 讀取商品
async function getProducts(filter=''){
  try{
    const url = `${SB_URL}/rest/v1/products?order=created_at.desc&select=*${filter?'&'+filter:''}`;
    const r = await fetch(url, { headers: sbHeaders });
    if(!r.ok) throw new Error('Network error');
    return await r.json();
  }catch(e){
    console.error('抓取商品失敗:', e);
    return [];
  }
}

// 新增前台送出訂單到 Supabase 的函式
async function createOrder(data){
  const r = await fetch(`${SB_URL}/rest/v1/orders`, {
    method: 'POST',
    headers: sbHeaders,
    body: JSON.stringify(data) // 同樣不用自己塞 ID
  });
  if(!r.ok) throw new Error('Order creation failed');
  return r.json();
}

// 新增前台即時扣減庫存到 Supabase 的函式
async function decreaseStock(id, currentStock){
  const nextStock = Math.max(0, Number(currentStock) - 1);
  const r = await fetch(`${SB_URL}/rest/v1/products?id=eq.${id}`, {
    method: 'PATCH',
    headers: sbHeaders,
    body: JSON.stringify({
      stock: nextStock,
      status: nextStock === 0 ? '已售出' : '販售中'
    })
  });
  if(!r.ok) throw new Error('Stock update failed');
  return r.json();
}

function setFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function render(){
  document.getElementById('gridTitle').textContent='載入中...';
  document.getElementById('productGrid').innerHTML='';
  const filter=currentFilter==='all'?'':'category=eq.'+encodeURIComponent(currentFilter);
  const list=await getProducts(filter)||[];
  cachedProducts = list; 
  
  const grid=document.getElementById('productGrid');
  const title=document.getElementById('gridTitle');
  const empty=document.getElementById('emptyMsg');
  title.textContent=`共 ${list.length} 件商品`;
  if(list.length===0){
    grid.innerHTML='';
    empty.innerHTML=`<div class="empty"><span class="empty-icon">💎</span><p>目前這個分類沒有商品<br>請稍後再來或私訊詢問</p></div>`;
    return;
  }
  empty.innerHTML='';
  grid.innerHTML=list.map((p,i)=>{
    const imgHtml=p.image
      ?`<img src="${p.image}" alt="${p.name}" loading="lazy"><span class="placeholder" style="display:none">${EMOJI[p.category]||'💎'}</span>`
      :`<span class="placeholder">${EMOJI[p.category]||'💎'}</span>`;
    const statusHtml=p.status==='已售出'?`<span class="card-status sold">已售出</span>`:p.status==='熱門'?`<span class="card-status hot">熱門</span>`:'';
    return `
      <div class="card" onclick="openModal(${i})">
        <div class="card-img">${imgHtml}${statusHtml}</div>
        <div class="card-body">
          <div class="card-category">${p.category||''}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price">NT$ ${Number(p.price).toLocaleString()}</div>
        </div>
      </div>`;
  }).join('');
}

function openModal(idx){
  const p=cachedProducts[idx]; 
  if(!p) return;
  currentProduct=p;
  const tags=(p.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const imgHtml=p.image?`<img src="${p.image}" alt="${p.name}">`:`<span style="font-size:5rem">${EMOJI[p.category]||'💎'}</span>`;
  const isSold=p.status==='已售出';
  const tagsHtml=tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-img">${imgHtml}</div>
    <div class="modal-body">
      <div class="modal-category">${p.category||''}</div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-price">NT$ ${Number(p.price).toLocaleString()}</div>
      <div class="modal-desc">${(p.description||'').replace(/\n/g,'<br>')}</div>
      ${tagsHtml?`<div class="modal-tags">${tagsHtml}</div>`:''}
      ${isSold
        ?`<button class="modal-cta sold-out" disabled>此商品已售出</button>`
        :`<button class="modal-cta" onclick="toggleOrderForm()">📦 我要購買</button>`
      }
      <div class="order-form" id="orderForm">
        <h3>填寫訂購資料</h3>
        <div class="form-group">
          <label>姓名 *</label>
          <input type="text" id="o-name" placeholder="收件人姓名">
        </div>
        <div class="form-group">
          <label>聯絡方式 * （電話或 LINE ID）</label>
          <input type="text" id="o-contact" placeholder="0912-345-678 或 LINE ID">
        </div>
        <div class="form-group">
          <label>收件地址</label>
          <input type="text" id="o-address" placeholder="如需宅配請填寫，面交可不填">
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="o-note" placeholder="特殊需求、想問的問題..."></textarea>
        </div>
        <div class="payment-info">
          <strong>付款方式說明</strong>
          下單後我們會在 24 小時內與您聯繫確認訂單<br>
          付款方式：銀行匯款 或 LINE Pay<br>
          確認付款後安排出貨或面交
        </div>
        <br>
        <button class="submit-btn" id="submitBtn" onclick="submitOrder()">確認送出訂單</button>
        <div class="order-success" id="orderSuccess">
          <div class="order-success-icon">✅</div>
          <p>訂單已送出！<br>我們會在 24 小時內透過您提供的聯絡方式與您確認。<br><br>感謝您選購黑柴珠寶 🪨</p>
        </div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
}

function toggleOrderForm(){
  const form=document.getElementById('orderForm');
  form.classList.toggle('show');
  if(form.classList.contains('show')) document.getElementById('o-name')?.focus();
}

async function submitOrder(){
  const name=document.getElementById('o-name').value.trim();
  const contact=document.getElementById('o-contact').value.trim();
  if(!name||!contact){ alert('請填寫姓名和聯絡方式'); return; }

  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='送出中...';

  const p=currentProduct;
  const order={
    product_id: p.id,
    product_name: p.name,
    price: p.price,
    buyer_name: name,
    contact: contact,
    address: document.getElementById('o-address').value.trim(),
    note: document.getElementById('o-note').value.trim(),
    status: '新訂單'
  };

  try{
    await createOrder(order);
    await decreaseStock(p.id, p.stock||1);

    if(FORMSPREE_ID && FORMSPREE_ID !== 'YOUR_FORMSPREE_ID'){
      await fetch(`https://formspree.io/f/${FORMSPREE_ID}`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({
          _subject: `【黑柴珠寶】新訂單 - ${p.name}`,
          商品: `${p.name} (NT$${Number(p.price).toLocaleString()})`,
          買家姓名: name,
          聯絡方式: contact,
          收件地址: order.address||'（未填）',
          備註: order.note||'（無）',
          下單時間: new Date().toLocaleString('zh-TW')
        })
      }).catch(()=>{});
    }
    document.getElementById('submitBtn').style.display='none';
    document.getElementById('orderSuccess').classList.add('show');
    render();
  } catch(e){
    btn.disabled=false;btn.textContent='確認送出訂單';
    alert('送出失敗，請稍後再試');
  }
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal')){
    document.getElementById('modal').classList.remove('show');
    currentProduct=null;
  }
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
